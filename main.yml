name: Forex Factory Discord Bot

on:
  schedule:
    # รันทุกวันเวลา 09:00 น. (UTC+7) - แปลงเป็น UTC คือ 02:00 UTC
    - cron: '0 2 * * *'
    # รันทุกวันเวลา 13:50 น. (UTC+7) - แปลงเป็น UTC คือ 06:50 UTC
    - cron: '50 6 * * *'
    # รันทุกวันเวลา 18:50 น. (UTC+7) - แปลงเป็น UTC คือ 11:50 UTC
    - cron: '50 11 * * *'
  workflow_dispatch: # อนุญาตให้รัน workflow ด้วยตนเองได้

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai python-dotenv

    - name: Run bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python main.py